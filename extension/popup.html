<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwiftDL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --border:    #1e1e2e;
      --accent:    #00e5ff;
      --accent2:   #7c3aed;
      --success:   #00d97e;
      --warn:      #f59e0b;
      --danger:    #ef4444;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --mono:      'Space Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    body {
      width: 360px;
      min-height: 480px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      padding: 16px 18px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .logo-text span { color: var(--accent); }

    /* ── Status dot ── */
    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 20px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--danger);
      transition: background 0.3s;
    }

    .dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .dot.checking { background: var(--warn); animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Toggle ── */
    .toggle-section {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .toggle-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      font-family: var(--mono);
    }

    .switch {
      position: relative;
      width: 44px; height: 24px;
      flex-shrink: 0;
    }

    .switch input { display: none; }

    .slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.25s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; top: 3px;
      background: var(--muted);
      border-radius: 50%;
      transition: transform 0.25s, background 0.25s;
    }

    input:checked + .slider { background: var(--accent2); }
    input:checked + .slider::before {
      transform: translateX(20px);
      background: white;
    }

    /* ── Settings ── */
    .settings {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .setting-row:last-child { margin-bottom: 0; }

    .setting-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    select, input[type="number"] {
      background: var(--border);
      border: 1px solid #2a2a3e;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      padding: 5px 8px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }

    select:focus, input[type="number"]:focus {
      border-color: var(--accent);
    }

    input[type="number"] { width: 64px; text-align: center; }

    /* ── Downloads list ── */
    .downloads-header {
      padding: 12px 18px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .downloads-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }

    .refresh-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.2s;
    }

    .refresh-btn:hover { color: var(--accent); }

    .downloads-list {
      max-height: 200px;
      overflow-y: auto;
      padding: 0 18px 14px;
    }

    .downloads-list::-webkit-scrollbar { width: 4px; }
    .downloads-list::-webkit-scrollbar-track { background: transparent; }
    .downloads-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    .dl-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 6px;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .dl-name {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }

    .dl-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .dl-status {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 700;
    }

    .dl-status.running  { background: rgba(0,229,255,0.1); color: var(--accent); }
    .dl-status.done     { background: rgba(0,217,126,0.1); color: var(--success); }
    .dl-status.merging  { background: rgba(245,158,11,0.1); color: var(--warn); }
    .dl-status.error    { background: rgba(239,68,68,0.1); color: var(--danger); }

    .dl-progress {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
    }

    .progress-bar-wrap {
      height: 3px;
      background: var(--border);
      border-radius: 3px;
      margin-top: 7px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 24px 0;
      color: var(--muted);
      font-size: 12px;
      font-family: var(--mono);
    }

    .empty-icon { font-size: 28px; margin-bottom: 8px; }

    /* ── Footer ── */
    footer {
      padding: 10px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-info {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
    }

    .footer-link {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .footer-link:hover { opacity: 1; }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">Swift<span>DL</span></div>
    </div>
    <div class="status-badge">
      <div class="dot checking" id="statusDot"></div>
      <span id="statusText">checking</span>
    </div>
  </header>

  <!-- Enable/Disable toggle -->
  <div class="toggle-section">
    <div>
      <div class="toggle-label">Intercept Downloads</div>
      <div class="toggle-sub" id="toggleSub">All downloads → SwiftDL manager</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="enableToggle" checked />
      <span class="slider"></span>
    </label>
  </div>

  <!-- Settings -->
  <div class="settings">
    <div class="setting-row">
      <span class="setting-label">Parallel Chunks</span>
      <input type="number" id="chunksInput" min="1" max="32" value="8" />
    </div>
    <div class="setting-row">
      <span class="setting-label">Manager Port</span>
      <input type="number" id="portInput" min="1024" max="65535" value="6543" />
    </div>
  </div>

  <!-- Active Downloads -->
  <div class="downloads-header">
    <span class="downloads-title">Active Downloads</span>
    <button class="refresh-btn" id="refreshBtn" title="Refresh">↻</button>
  </div>

  <div class="downloads-list" id="downloadsList">
    <div class="empty">
      <div class="empty-icon">📭</div>
      No active downloads
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <span class="footer-info">localhost:<span id="footerPort">6543</span></span>
    <span class="footer-info">v1.0.0</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
