<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SwiftDL</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0a0f;
        --surface: #111118;
        --border: #1e1e2e;
        --accent: #00e5ff;
        --accent2: #7c3aed;
        --success: #00d97e;
        --warn: #f59e0b;
        --danger: #ef4444;
        --text: #e2e8f0;
        --muted: #64748b;
      }

      body {
        width: 400px;
        min-height: 500px;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", system-ui, sans-serif;
        font-size: 13px;
      }

      /* ── Header ── */
      header {
        padding: 14px 16px 12px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: relative;
      }
      header::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          var(--accent),
          var(--accent2),
          transparent
        );
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 9px;
      }
      .logo-icon {
        width: 30px;
        height: 30px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
      }
      .logo-text {
        font-size: 17px;
        font-weight: 800;
        letter-spacing: -0.5px;
      }
      .logo-text span {
        color: var(--accent);
      }

      /* ── Status ── */
      .status-badge {
        display: flex;
        align-items: center;
        gap: 5px;
        font-family: monospace;
        font-size: 10px;
        color: var(--muted);
        padding: 3px 8px;
        border: 1px solid var(--border);
        border-radius: 20px;
      }
      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--danger);
        transition: background 0.3s;
      }
      .dot.online {
        background: var(--success);
        box-shadow: 0 0 6px var(--success);
      }
      .dot.checking {
        background: var(--warn);
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      /* ── Toggle row ── */
      .toggle-row {
        padding: 11px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
      }
      .toggle-label {
        font-size: 12px;
        font-weight: 600;
      }
      .toggle-sub {
        font-size: 10px;
        color: var(--muted);
        margin-top: 2px;
        font-family: monospace;
      }
      .switch {
        position: relative;
        width: 42px;
        height: 23px;
        flex-shrink: 0;
      }
      .switch input {
        display: none;
      }
      .slider {
        position: absolute;
        inset: 0;
        background: var(--border);
        border-radius: 23px;
        cursor: pointer;
        transition: background 0.25s;
      }
      .slider::before {
        content: "";
        position: absolute;
        width: 17px;
        height: 17px;
        left: 3px;
        top: 3px;
        background: var(--muted);
        border-radius: 50%;
        transition:
          transform 0.25s,
          background 0.25s;
      }
      input:checked + .slider {
        background: var(--accent2);
      }
      input:checked + .slider::before {
        transform: translateX(19px);
        background: white;
      }

      /* ── Settings ── */
      .settings {
        padding: 11px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        gap: 16px;
      }
      .setting {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .setting label {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .setting input[type="number"] {
        width: 58px;
        padding: 4px 6px;
        text-align: center;
        background: var(--border);
        border: 1px solid #2a2a3e;
        color: var(--text);
        font-family: monospace;
        font-size: 12px;
        border-radius: 5px;
        outline: none;
      }
      .setting input:focus {
        border-color: var(--accent);
      }

      /* ── Tabs ── */
      .tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
      }
      .tab-btn {
        flex: 1;
        padding: 9px;
        background: none;
        border: none;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        position: relative;
        transition: color 0.2s;
      }
      .tab-btn:hover {
        color: var(--text);
      }
      .tab-btn.active {
        color: var(--accent);
      }
      .tab-btn.active::after {
        content: "";
        position: absolute;
        bottom: -1px;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--accent);
      }
      .tab-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 16px;
        height: 16px;
        padding: 0 4px;
        background: var(--accent2);
        color: white;
        border-radius: 8px;
        font-size: 10px;
        margin-left: 5px;
      }

      /* ── Tab content ── */
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }

      /* ── Section header ── */
      .section-header {
        padding: 9px 16px 6px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .section-title {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--muted);
      }
      .icon-btn {
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 14px;
        padding: 2px 5px;
        border-radius: 4px;
        transition: color 0.2s;
      }
      .icon-btn:hover {
        color: var(--accent);
      }

      /* ── List shared ── */
      .scroll-list {
        max-height: 220px;
        overflow-y: auto;
        padding: 0 16px 12px;
      }
      .scroll-list::-webkit-scrollbar {
        width: 4px;
      }
      .scroll-list::-webkit-scrollbar-track {
        background: transparent;
      }
      .scroll-list::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }

      /* ── Empty state ── */
      .empty {
        text-align: center;
        padding: 28px 0;
        color: var(--muted);
        font-family: monospace;
        font-size: 11px;
      }
      .empty-icon {
        font-size: 26px;
        margin-bottom: 7px;
      }

      /* ── Download item ── */
      .dl-item {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 9px 11px;
        margin-bottom: 5px;
        animation: slideIn 0.2s ease;
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-3px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .dl-name {
        font-size: 12px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 5px;
      }
      .dl-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .dl-status {
        font-family: monospace;
        font-size: 10px;
        padding: 2px 7px;
        border-radius: 20px;
        font-weight: 700;
      }
      .dl-status.running {
        background: rgba(0, 229, 255, 0.1);
        color: var(--accent);
      }
      .dl-status.done {
        background: rgba(0, 217, 126, 0.1);
        color: var(--success);
      }
      .dl-status.merging {
        background: rgba(245, 158, 11, 0.1);
        color: var(--warn);
      }
      .dl-status.error {
        background: rgba(239, 68, 68, 0.1);
        color: var(--danger);
      }
      .dl-progress {
        font-family: monospace;
        font-size: 10px;
        color: var(--muted);
      }
      .progress-bar {
        height: 3px;
        background: var(--border);
        border-radius: 3px;
        margin-top: 6px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        border-radius: 3px;
        transition: width 0.4s;
      }

      /* ── Video item ── */
      .video-item {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 9px 11px;
        margin-bottom: 6px;
        animation: slideIn 0.2s ease;
      }
      .video-name {
        font-size: 12px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 4px;
      }
      .video-url {
        font-family: monospace;
        font-size: 9px;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 6px;
      }
      .video-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
      }
      .video-type {
        font-family: monospace;
        font-size: 9px;
        padding: 2px 6px;
        background: rgba(0, 229, 255, 0.1);
        color: var(--accent);
        border-radius: 4px;
      }
      .video-time {
        font-size: 10px;
        color: var(--muted);
      }
      .btn-dl {
        background: var(--accent2);
        border: none;
        color: white;
        font-size: 10px;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
        transition: background 0.2s;
        flex-shrink: 0;
      }
      .btn-dl:hover {
        background: var(--accent);
        color: #000;
      }
      .btn-dl:disabled {
        background: var(--muted);
        cursor: not-allowed;
      }

      /* ── Filter ── */
      .filter-row {
        padding: 0 16px 8px;
        display: flex;
        gap: 6px;
      }
      .filter-row input,
      .filter-row select {
        padding: 5px 9px;
        background: var(--border);
        border: 1px solid #2a2a3e;
        color: var(--text);
        font-size: 11px;
        border-radius: 5px;
        outline: none;
      }
      .filter-row input {
        flex: 1;
      }
      .filter-row input:focus,
      .filter-row select:focus {
        border-color: var(--accent);
      }

      /* ── Footer ── */
      footer {
        padding: 8px 16px;
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .footer-info {
        font-family: monospace;
        font-size: 10px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <div class="logo-text">Swift<span>DL</span></div>
      </div>
      <div class="status-badge">
        <div class="dot checking" id="statusDot"></div>
        <span id="statusText">checking</span>
      </div>
    </header>

    <!-- Enable toggle -->
    <div class="toggle-row">
      <div>
        <div class="toggle-label">Intercept Downloads</div>
        <div class="toggle-sub" id="toggleSub">
          All downloads → SwiftDL manager
        </div>
      </div>
      <label class="switch">
        <input type="checkbox" id="enableToggle" checked />
        <span class="slider"></span>
      </label>
    </div>

    <!-- Settings -->
    <div class="settings">
      <div class="setting">
        <label>Chunks</label>
        <input type="number" id="chunksInput" min="1" max="32" value="8" />
      </div>
      <div class="setting">
        <label>Port</label>
        <input
          type="number"
          id="portInput"
          min="1024"
          max="65535"
          value="6543"
        />
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="downloads">Downloads</button>
      <button class="tab-btn" data-tab="videos">
        Videos <span class="tab-badge" id="videoBadge">0</span>
      </button>
    </div>

    <!-- Downloads tab -->
    <div class="tab-content active" id="tab-downloads">
      <div class="section-header">
        <span class="section-title">Active Downloads</span>
        <button class="icon-btn" id="refreshDlBtn" title="Refresh">↻</button>
      </div>
      <div class="scroll-list" id="downloadsList">
        <div class="empty">
          <div class="empty-icon">📭</div>
          No active downloads
        </div>
      </div>
    </div>

    <!-- Videos tab -->
    <div class="tab-content" id="tab-videos">
      <div class="section-header">
        <span class="section-title">Detected Videos</span>
        <div style="display: flex; gap: 4px">
          <button class="icon-btn" id="clearVideosBtn" title="Clear all">
            🗑
          </button>
          <button class="icon-btn" id="refreshVideosBtn" title="Refresh">
            ↻
          </button>
        </div>
      </div>
      <div class="filter-row">
        <input type="text" id="filterInput" placeholder="Filter..." />
        <select id="typeFilter">
          <option value="all">All types</option>
          <option value="mp4">MP4</option>
          <option value="webm">WebM</option>
          <option value="mpegURL">HLS</option>
          <option value="dash">DASH</option>
        </select>
      </div>
      <div class="scroll-list" id="videosList">
        <div class="empty">
          <div class="empty-icon">🎬</div>
          Play a video to detect it
        </div>
      </div>
    </div>

    <footer>
      <span class="footer-info"
        >localhost:<span id="footerPort">6543</span></span
      >
      <span class="footer-info">SwiftDL v2.0</span>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
